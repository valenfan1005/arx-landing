name: Daily Market Pages Refresh

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate market pages
        run: python3 scripts/generate_market_pages.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add markets/ sitemap.xml
          git diff --staged --quiet || git commit -m "chore(markets): daily price refresh [$(date -u +%Y-%m-%d)]"
          git push
